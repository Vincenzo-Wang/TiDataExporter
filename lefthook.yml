commit-msg:
  commands:
    validate:
      run: |
        commit_msg=$(cat {1})
        if ! echo "$commit_msg" | grep -qE "^(AI|Manual)-(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)"; then
          echo "================================================================="
          echo "[REJECTED] ❌Invalid Commit Message Format"
          echo "✅Required format:"
          echo "1. Must start with 'AI-' or 'Manual-'"
          echo "2. Followed by: feat, fix, docs, style, refactor, test, chore, perf, ci, build, revert"
          echo "Example: AI-feat: add login feature"
          echo "================================================================="
          exit 1
        fi


