version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: claw-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-claw_export}
      MYSQL_USER: ${MYSQL_USER:-claw}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-claw123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations/init.sh:/docker-entrypoint-initdb.d/01_init.sh:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: claw-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: claw-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_PORT=${APP_PORT:-8080}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER:-claw}
      - DB_PASSWORD=${MYSQL_PASSWORD:-claw123}
      - DB_NAME=${MYSQL_DATABASE:-claw_export}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - JWT_SECRET=${JWT_SECRET:-claw-export-jwt-secret-key-for-production}
      - AES_KEY=${AES_KEY:-claw-export-aes-key-32-bytes!!!!}
      - DUMPLING_PATH=/usr/local/bin/dumpling
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-}
    volumes:
      - ./backend/config:/app/config:ro
      - ${HOST_DUMPLING_PATH:-/usr/local/bin/dumpling}:/usr/local/bin/dumpling:ro
      - tmp_data:/tmp/exports
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: claw-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker Service (Task Executor)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: claw-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER:-claw}
      - DB_PASSWORD=${MYSQL_PASSWORD:-claw123}
      - DB_NAME=${MYSQL_DATABASE:-claw_export}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - AES_KEY=${AES_KEY:-claw-export-aes-key-32-bytes!!!!}
      - DUMPLING_PATH=/usr/local/bin/dumpling
      - WORKER_COUNT=${WORKER_COUNT:-4}
    volumes:
      - ${HOST_DUMPLING_PATH:-/usr/local/bin/dumpling}:/usr/local/bin/dumpling:ro
      - tmp_data:/tmp/exports
    user: "0:0"  # Run as root for volume access

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  tmp_data:
    driver: local

networks:
  default:
    name: claw-network
